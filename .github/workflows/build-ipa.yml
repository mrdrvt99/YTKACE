name: IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: YouTube IPA URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-deb.yml

  package:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: YTKACE-deb
          path: packages

      - uses: levibostian/action-hide-sensitive-inputs@v1

      - name: Setup
        run: brew install ldid dpkg

      - name: YouTube
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O YouTube.ipa
          file_type=$(file --mime-type -b YouTube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            exit 1
          fi

      - name: Inject
        run: |
          mkdir tweak
          dpkg-deb -x packages/*.deb tweak
          export LDID="$(brew --prefix)/bin/ldid"
          bash Scripts/sideload-repack.sh YouTube.ipa tweak/Applications/YouTube.app/Frameworks/YTKACE.dylib YTKACE_YouTube.ipa
          bash Tools/verify-artifacts.sh tweak/Applications/YouTube.app/Frameworks/YTKACE.dylib YTKACE_YouTube.ipa

      - uses: actions/upload-artifact@v7
        with:
          name: YTKACE-IPA
          path: YTKACE_YouTube.ipa
          if-no-files-found: error
