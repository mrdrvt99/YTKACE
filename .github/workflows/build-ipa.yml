name: IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    env:
      THEOS: ${{ github.workspace }}/.theos
      YOUTUBE_IPA_URL: ${{ secrets.YOUTUBE_IPA_URL }}
      YOUTUBE_IPA_SHA256: ${{ secrets.YOUTUBE_IPA_SHA256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          brew install ldid
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS"

      - name: Test
        run: python3 -m unittest discover -s Tests -v

      - name: Build
        run: bash Scripts/build.sh

      - name: YouTube
        run: |
          test -n "$YOUTUBE_IPA_URL"
          curl --fail --location "$YOUTUBE_IPA_URL" --output YouTube.ipa
          if [[ -n "$YOUTUBE_IPA_SHA256" ]]; then
            echo "$YOUTUBE_IPA_SHA256  YouTube.ipa" | shasum -a 256 -c -
          fi

      - name: Inject
        run: |
          export LDID="$(brew --prefix)/bin/ldid"
          bash Scripts/sideload-repack.sh YouTube.ipa dist/YTKACE.dylib dist/YTKACE_YouTube.ipa
          bash Tools/verify-artifacts.sh dist/YTKACE.dylib dist/YTKACE_YouTube.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: YTKACE-IPA
          path: |
            dist/YTKACE.dylib
            dist/YTKACE_YouTube.ipa
          if-no-files-found: error
