name: Deb
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      THEOS: ${{ github.workspace }}/.theos
      CI: true
    steps:
      - uses: actions/checkout@v7
      - name: Setup
        run: bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
      - name: Test
        run: python3 -m unittest discover -s Tests -v
      - name: Build
        run: make clean package FINALPACKAGE=1
      - uses: actions/upload-artifact@v7
        with:
          name: YTKACE-deb
          path: packages/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: YTKACE-deb
          path: packages

      - name: Get version
        id: version
        run: |
          FILE=$(ls packages/*.deb | head -n1)
          VERSION=$(basename "$FILE" | sed -E 's/^[^_]+_([0-9]+\.[0-9]+\.[0-9]+)_.*$/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          tag_name: deb-${{ steps.version.outputs.version }}
          name: YTKACE ${{ steps.version.outputs.version }}
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
