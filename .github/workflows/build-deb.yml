name: Deb

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    env:
      THEOS: ${{ github.workspace }}/.theos
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          brew install ldid
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS"

      - name: Test
        run: python3 -m unittest discover -s Tests -v

      - name: Build
        run: make clean package FINALPACKAGE=1

      - uses: actions/upload-artifact@v4
        with:
          name: YTKACE-deb
          path: packages/*.deb
          if-no-files-found: error
